version: '3.9'

# Production compose — all services on an internal Docker network.
# Only the frontend port is exposed to the host (for Nginx).
# Set all values in .env (copy from .env.production.example).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillforge
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: skillforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://skillforge:${DB_PASSWORD}@postgres:5432/skillforge
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: https://${DOMAIN}
      GENERATED_LESSONS_DIR: /app/generated_lessons
      # AI lesson generation — leave blank to disable background generation
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_WORKER_URL: http://ai-worker:8000
      DB_SSL: "false"
      # Email (OTP sign-in) via Gmail SMTP app password. Leave blank to log codes instead.
      GMAIL_USER: ${GMAIL_USER:-}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FRONTEND_URL: https://${DOMAIN}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status < 500 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      BACKEND_URL: http://backend:3001
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
