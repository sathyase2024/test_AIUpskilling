name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Remove routes that require a backend
        run: rm -rf frontend/app/learn frontend/app/topics/\[slug\]

      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /test_AIUpskilling
          NEXT_PUBLIC_API_URL: ${{ secrets.RENDER_BACKEND_URL || 'https://skillforge-backend.onrender.com' }}

      - name: Add .nojekyll
        run: touch frontend/out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/out
          publish_branch: gh-pages
          force_orphan: true
