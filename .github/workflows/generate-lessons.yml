name: Generate Lessons — Batch

on:
  workflow_dispatch:
    inputs:
      batch_number:
        description: 'Batch to generate (1-6, or "all" for everything)'
        required: true
        default: '1'
        type: choice
        options: ['1', '2', '3', '4', '5', '6', 'all']

jobs:
  generate:
    name: Generate batch ${{ inputs.batch_number }}
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run batch generation
        continue-on-error: true
        run: |
          if [ "${{ inputs.batch_number }}" = "all" ]; then
            python scripts/batch_generate.py --all --concurrency 5
          else
            python scripts/batch_generate.py --batch ${{ inputs.batch_number }} --concurrency 5
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

      - name: Commit and push generated lessons
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "SkillForge Generator"
          git add generated_lessons/ generation_progress.json
          git diff --staged --quiet || git commit -m "chore: Generate lessons batch ${{ inputs.batch_number }} [skip ci]"
          git push

      - name: Send completion email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} SkillForge Batch ${{ inputs.batch_number }} — ${{ job.status }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: SkillForge Generator <${{ secrets.GMAIL_USER }}>
          body: "Batch ${{ inputs.batch_number }} completed with status: ${{ job.status }}. Check GitHub Actions for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
