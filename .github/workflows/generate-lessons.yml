name: Generate Lessons — SkillForge

on:
  workflow_dispatch:
    inputs:
      course_index:
        description: 'Single course index 0-59 (leave empty to use batch_number)'
        required: false
        default: ''
        type: string
      batch_number:
        description: 'Batch 1-6 or "all" (used only when course_index is empty)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4', '5', '6', 'all']

jobs:
  generate:
    name: Generate lessons
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install anthropic json-repair

      - name: Run generation
        continue-on-error: true
        env:
          COURSE_INDEX: ${{ inputs.course_index }}
          BATCH_NUMBER: ${{ inputs.batch_number }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -n "$COURSE_INDEX" ]; then
            python scripts/batch_generate.py --course "$COURSE_INDEX" --concurrency 3
          elif [ "$BATCH_NUMBER" = "all" ]; then
            python scripts/batch_generate.py --all --concurrency 3
          else
            python scripts/batch_generate.py --batch "$BATCH_NUMBER" --concurrency 3
          fi

      - name: Commit and push generated lessons
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "SkillForge Generator"
          git add generated_lessons/ generation_progress.json
          git diff --staged --quiet || git commit -m "chore: Generate lessons [skip ci]"
          git pull --rebase origin main
          git push

      - name: Send completion email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ job.status == 'success' && '✅' || '❌' }} SkillForge — ${{ job.status }}"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: SkillForge Generator <${{ secrets.GMAIL_USER }}>
          body: "Generation done: ${{ job.status }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
